name: Audio Decode Libav Build

on:
  push:
    tags:
      - 'v*'
  repository_dispatch:
    types: [upstream-libav-updated]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync and Build 6 Variants array
        run: bash build/sync_and_build.sh

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audio-decode-libav-build
          path: dist/*.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true

      - name: Trigger Downstream neiro-libav build
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'repository_dispatch'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT }}
          repository: divortio/neiro-libav
          event-type: upstream-audio-decode-updated
