name: Audio Decode Libav Build

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout audio-decode-libav
        uses: actions/checkout@v4
        with:
          path: src/audio-decode-libav

      - name: Checkout libav.js-audio
        uses: actions/checkout@v4
        with:
          repository: divortio/libav.js-audio
          path: src/libav.js-audio

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Download Pre-built libav.js-audio dependency
        run: |
          mkdir -p src/libav.js-audio/src/libav.js/dist/libav-6.8.8.0-audio
          gh release download --repo divortio/libav.js-audio --pattern "*.zip" --dir src/libav.js-audio/src/libav.js/dist/libav-6.8.8.0-audio
          cd src/libav.js-audio/src/libav.js/dist/libav-6.8.8.0-audio
          for z in *.zip; do unzip -q "$z"; rm "$z"; done
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}

      - name: Sync and Build 6 Variants array
        run: cd src/audio-decode-libav && bash build/sync_and_build.sh

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audio-decode-libav-build
          path: src/audio-decode-libav/dist/*.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src/audio-decode-libav/dist/*.zip
          generate_release_notes: true

